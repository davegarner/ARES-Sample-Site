<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#05070b">
  <base href="/">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <script src="/assets/js/markdown.js" defer></script>
  <script src="/assets/js/site.js" defer></script>
</head>
<body data-page="tool-password">
  <div class="viewport-shell">
    <div class="site-shell">
      <div id="header-slot"></div>
      <main class="page-main single">
        <section class="panel shell-panel">
          <h1 class="panel-title">Tools // Password Generator</h1>
          <div class="form-grid">
            <div class="form-row">
              <label for="username">Username</label>
              <input id="username" class="text-input" type="text" placeholder="operator.name">
            </div>
            <div class="form-row">
              <label for="website">Website</label>
              <input id="website" class="text-input" type="text" placeholder="example.net">
            </div>
          </div>
          <div class="helper">Format: three blocks of six characters separated by hyphens, lowercase letters with exactly one uppercase and one number inserted across the full password.</div>
          <div class="terminal-window"><div id="password-output" class="password-output"></div></div>
          <div class="page-toolbar">
            <button id="generate-password" class="btn" type="button">Generate</button>
            <button id="download-password-csv" class="btn" type="button">Download CSV</button>
            <a class="btn" href="/index.html">Back to Home</a>
          </div>
        </section>
      </main>
      <div id="footer-slot"></div>
    </div>
  </div>
</body>
</html>
